<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-container">

    <h1 class="logo">PYTHON</h1>
     <p class="sub-title">
        Start Your Coding Journey
    </p>

    <h2 class="sub-title">회원가입</h2>

    <form method="POST" class="auth-form">

        <input
            type="text"
            name="name"
            placeholder="이름"
            aria-label="이름 입력"
            required>

        <input
            type="email"
            name="email"
            placeholder="이메일"
            aria-label="이메일 입력"
            required>

        <input
            type="password"
            name="password"
            placeholder="비밀번호"
            aria-label="비밀번호 입력"
            required>

        <button type="submit">
            회원가입
        </button>

    </form>

    <p class="bottom-text">
        이미 계정이 있으신가요?
        <a href="/login">로그인</a>
    </p>

</div>

</body>
</html>

<h1 class="logo">PYTHON</h1>

<p class="sub-title">
    Start Your Coding Journey
</p>
